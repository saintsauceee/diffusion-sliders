name: Deploy web app to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'outputs/unitoken/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Verify outputs are present
        working-directory: ${{ github.workspace }}
        run: |
          if [ ! -d outputs/unitoken ]; then
            echo "::error::outputs/unitoken/ is not checked into the repo."
            exit 1
          fi
          echo "Found $(find outputs/unitoken -name '*.png' | wc -l) PNG(s)."

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Enables Pages on the repo + computes basePath. Safe to call when already enabled.
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
          static_site_generator: next

      - name: Install dependencies
        run: npm install --no-audit --no-fund --loglevel verbose 2>&1 | tail -40

      - name: Pre-build (scan outputs/, write tree + stage PNGs)
        env:
          OUTPUTS_DIR: ${{ github.workspace }}/outputs
          STAGE_MODE: copy
          CI: 'true'
        run: |
          node scripts/build-tree.mjs
          echo "--- manifest first 30 lines ---"
          head -n 30 lib/tree-data.generated.ts
          echo "--- public/data/unitoken size ---"
          du -sh public/data/unitoken

      - name: Next build (static export)
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_TELEMETRY_DISABLED: '1'
        run: |
          echo "BASE_PATH=$BASE_PATH"
          npx next build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
