name: Deploy web app to GitHub Pages

# Re-trigger after manual Pages enablement.

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'outputs/unitoken/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Verify outputs are present
        working-directory: ${{ github.workspace }}
        run: |
          if [ ! -d outputs/unitoken ]; then
            echo "::error::outputs/unitoken/ is not checked into the repo."
            exit 1
          fi
          echo "Found $(find outputs/unitoken -name '*.png' | wc -l) PNG(s)."

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Reads Pages config (must already be enabled in repo Settings → Pages →
      # Source = "GitHub Actions"). Surfaces basePath for next.config.mjs.
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Pre-build (scan outputs/, write tree + stage PNGs)
        env:
          OUTPUTS_DIR: ${{ github.workspace }}/outputs
          STAGE_MODE: copy
          CI: 'true'
        run: |
          node scripts/build-tree.mjs
          echo "--- manifest first 30 lines ---"
          head -n 30 lib/tree-data.generated.ts
          echo "--- public/data/unitoken size ---"
          du -sh public/data/unitoken

      - name: Next build (static export)
        id: nextbuild
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_TELEMETRY_DISABLED: '1'
        run: |
          echo "BASE_PATH=$BASE_PATH"
          set -o pipefail
          npx next build 2>&1 | tee next-build.log

      - name: Surface build error (annotations + summary)
        if: failure() && steps.nextbuild.conclusion == 'failure'
        run: |
          # Step summary (requires admin to view, but useful when it works)
          {
            echo '## Next build failure (tail)';
            echo '```';
            tail -n 200 next-build.log || true;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

          # Annotations are public via the check-runs API. Emit the last
          # 80 non-empty lines of build output, each as a ::error::, so we
          # can read the failure without admin log access.
          tail -n 80 next-build.log | sed '/^[[:space:]]*$/d' | while IFS= read -r line; do
            # GitHub strips control chars; remove ANSI escapes to keep it readable
            clean=$(printf '%s' "$line" | sed $'s/\x1b\\[[0-9;]*[a-zA-Z]//g')
            printf '::error::%s\n' "$clean"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
